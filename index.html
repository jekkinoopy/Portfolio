    <style>
        /* 1. 確保 html 與 body 撐滿全高，並移除預設邊距 */
        html,
        body {
            height: 100%;
            margin: 0;
        }

        body {
            display: flex;
            flex-direction: column;
            /* 讓內容垂直排列 */
            min-height: 100vh;
            /* 確保 body 至少跟視窗一樣高 */
        }

        header {
            /* height: 80vh; */
            background: var(--light-yellow);
            padding: 0 10%;
            /* 移除底部的 5% padding，避免重心偏移 */
            display: flex;
            /* 1. 讓 header 變 Flex 容器 */
            flex-direction: column;
            /* 2. 讓 navbar 和 hero 垂直排列 */
            flex: 1;
            /* 關鍵：讓 Header 佔據除了 Footer 以外的所有剩餘空間 */
        }

        .navbar {
            display: flex;
            justify-content: center;
            padding: 20px 50px;
            flex-shrink: 0;
            /* 3. 防止導覽列被壓縮 */
        }

        .hero-section {
            display: flex;
            flex: 1;
            /* 4. 關鍵：讓 hero 自動佔滿剩餘的所有高度 */
            justify-content: center;
            /* 水平置中內容 */
            align-items: center;
            /* 垂直置中內容 */
            background: var(--light-yellow);

        }
    </style>
</head>
